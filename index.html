<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Market Clock 24h - WIB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f172a; /* Slate 900 */
        color: #e2e8f0; /* Slate 200 */
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body>
    <div id="app" class="min-h-screen bg-slate-950 text-slate-200 flex flex-col font-sans selection:bg-orange-500/30">
      
      <!-- Header -->
      <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="bg-orange-600 p-2 rounded-lg">
              <!-- Globe Icon SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white">Global Market Clock</h1>
                <p class="text-xs text-slate-400 font-mono">market.hdweb.my.id</p>
            </div>
          </div>
          
          <div class="hidden md:flex items-center gap-4 text-sm font-mono text-slate-400">
             <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-orange-500"></span> Open
             </div>
             <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-slate-600"></span> Closed
             </div>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="flex-grow p-4 md:p-8 flex flex-col items-center">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-light text-slate-300">Live Trading Sessions</h2>
            <p class="text-slate-500 mt-1">24-hour visualization (WIB / UTC+7 Banyumas Time)</p>
        </div>

        <!-- Clock Container -->
        <div class="flex flex-col items-center justify-center p-4 w-full max-w-2xl mx-auto">
            <div class="relative w-full aspect-square max-w-[500px]" id="clock-wrapper">
                <!-- SVG will be injected here by JS -->
            </div>
        </div>

        <!-- Market List Grid -->
        <div id="market-list" class="mt-8 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full max-w-6xl">
            <!-- Market items will be injected here by JS -->
        </div>

      </main>

      <!-- Footer -->
      <footer class="border-t border-slate-900 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-600 text-sm">
          <p class="market-year">© 2024 HDWeb Market Tools. Data is for visualization purposes only.</p>
        </div>
      </footer>
    </div>

    <!-- Application Logic -->
    <script src="script.js"></script>
  </body>
</html>
